<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoTrack — Sign In</title>
  <link rel="stylesheet" href="css/stylesheet.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* ── Logon page layout ── */
    .logon-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .logon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card header / brand ── */
    .logon-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 28px 28px 24px;
      border-bottom: 1px solid var(--border);
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 16px;
      flex-shrink: 0;
    }

    .brand-text {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .brand-text span { color: var(--accent); }
    .logo-wheel {
      width: 0.95em;
      height: 0.95em;
      vertical-align: -0.175em;
      margin: 0 2px 0 -.5px;
      color: #1a1a1a;
    }

    .brand-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    /* ── Tab bar ── */
    .logon-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .logon-tab {
      padding: 12px;
      background: none;
      border: none;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      border-bottom: 2px solid transparent;
    }

    .logon-tab:hover { color: var(--text-dim); }

    .logon-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: var(--accent-glow);
    }

    /* ── Form body ── */
    .logon-body { padding: 28px; }

    .logon-form { display: none; flex-direction: column; gap: 16px; }
    .logon-form.active-form { display: flex; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .form-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: border-color var(--transition);
    }

    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--accent-dim); }

    .submit-btn {
      margin-top: 4px;
      width: 100%;
      height: 42px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition);
    }

    .submit-btn:hover { background: #7aaa7e; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Message ── */
    .logon-message {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 10px 14px;
      border-radius: var(--radius);
      display: none;
    }

    .logon-message.error {
      display: block;
      background: rgba(224, 92, 92, 0.12);
      border: 1px solid rgba(224, 92, 92, 0.3);
      color: var(--red);
    }

    .logon-message.success {
      display: block;
      background: rgba(76, 175, 129, 0.12);
      border: 1px solid rgba(76, 175, 129, 0.3);
      color: var(--green);
    }

    /* ── Footer ── */
    .logon-footer {
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<div class="logon-wrapper">
  <div class="logon-card">

    <!-- Brand -->
    <div class="logon-brand">
      <div class="brand-icon"><i class="fa-solid fa-car"></i></div>
      <div>
        <div class="brand-text">AUT<svg class="logo-wheel" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="9.2" fill="currentColor"/><circle cx="10" cy="10" r="5.8" fill="#ebe0d0"/><line x1="10" y1="7.8" x2="10" y2="5.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="12.09" y1="9.32" x2="14.56" y2="8.52" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="11.29" y1="11.78" x2="12.82" y2="13.88" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="8.71" y1="11.78" x2="7.18" y2="13.88" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="7.91" y1="9.32" x2="5.44" y2="8.52" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="10" cy="10" r="2.2" fill="currentColor"/></svg><span>TRACK</span></div>
        <div class="brand-sub">Vehicle Maintenance Tracker — Team GR8</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="logon-tabs">
      <button class="logon-tab active" id="login-tab">Sign In</button>
      <button class="logon-tab" id="create-account-tab">Create Account</button>
    </div>

    <!-- Forms -->
    <div class="logon-body">

      <!-- Sign In Form -->
      <form id="logon-form" class="logon-form active-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-input" type="email" id="login-email"
                 placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password"
                 placeholder="Enter your password" required />
        </div>
        <p id="message" class="logon-message"></p>
        <button type="submit" class="submit-btn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
        </button>
      </form>

      <!-- Create Account Form -->
      <form id="create-account-form" class="logon-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="create-email">Email</label>
          <input class="form-input" type="email" id="create-email"
                 placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="create-password">Password</label>
          <input class="form-input" type="password" id="create-password"
                 placeholder="Create a password" required />
        </div>
        <p id="create-message" class="logon-message"></p>
        <button type="submit" class="submit-btn">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
      </form>

    </div><!-- /logon-body -->

    <div class="logon-footer">// SECURE LOGIN · JWT AUTHENTICATED</div>

  </div>
</div>

<script src="js/logon.js"></script>
</body>
</html>
